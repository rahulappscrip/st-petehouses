document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

sing date. We handle the paperwork and closing costs, so you can move on quickly.\"}},\n        {\"@type\":\"Question\",\"name\":\"How fast can I sell my house to a cash buyer in Clearwater?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"You can sell your Clearwater house for cash in as little as 7 days, though most closings in the Tampa Bay area take 7–14 days depending on title work and your schedule. You control the timeline.\"}},\n        {\"@type\":\"Question\",\"name\":\"What types of properties do you buy in Clearwater?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"We buy single-family homes, condos, townhomes, and multi-unit properties in Clearwater, regardless of condition or price range. Whether your home needs major repairs or is move-in ready, we make fair cash offers.\"}},\n        {\"@type\":\"Question\",\"name\":\"Are cash buyers legitimate in Clearwater?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Yes, many cash home buyers in Clearwater are legitimate, but always check reviews and verify credentials before proceeding. We encourage you to review our testimonials and ask for proof of funds before accepting any offer.\"}},\n        {\"@type\":\"Question\",\"name\":\"Is there a non-committal cash offer for Clearwater homes?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Yes, our cash offers are free and carry no obligation to accept. Request an offer, review it on your own time, and decide what's best for you — no pressure.\"}},\n        {\"@type\":\"Question\",\"name\":\"Are there any fees or commissions when selling to a cash buyer?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"No, there are no fees or real estate commissions when you sell your house for cash to us. We also cover closing costs, so you keep more of your sale price.\"}},\n        {\"@type\":\"Question\",\"name\":\"Do I have to make repairs before selling my house for cash in Clearwater?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"No repairs are needed — we buy Clearwater houses as-is, in any condition. You don't have to fix, clean, or stage anything. We handle it all after closing.\"}},\n        {\"@type\":\"Question\",\"name\":\"How do I get a cash offer for my home in Clearwater?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Getting a cash offer is easy: 1) Fill out our online form or call us. 2) We review your property. 3) Get your cash offer — no pressure, no commitment. The whole process takes just a few minutes to start.\"}},\n        {\"@type\":\"Question\",\"name\":\"What is the difference between a cash offer and listing with an agent?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Cash offers mean no commissions, fast closings, and no showings; agent listings may take longer and involve commissions, repairs, and buyer financing risks. With a cash offer, you get certainty and speed.\"}},\n        {\"@type\":\"Question\",\"name\":\"How are cash offers calculated in Clearwater?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Cash offers are based on your home's as-is value, minus repair costs and a fair margin for resale. Every offer is tailored to local Clearwater market conditions. We use recent sales data and property condition to determine a fair price.\"}}\n      ]\n    },\n    {\n      \"@type\": \"BreadcrumbList\",\n      \"itemListElement\": [\n        {\"@type\":\"ListItem\",\"position\":1,\"name\":\"Home\",\"item\":\"https://webuystpetehouses.com/\"},\n        {\"@type\":\"ListItem\",\"position\":2,\"name\":\"We Buy Houses Clearwater FL\"}\n      ]\n    }\n  ]\n}\n<\u002Fscript>\n\n<style>\n/* ============================================================\n   Design tokens (shared with brand landing page)\n   ============================================================ */\n:root{\n  --sand:        #F4EEE2;\n  --sand-2:      #EBE3D3;\n  --paper:       #FBF7EF;\n  --ink:         #14242F;\n  --ink-2:       #2E4150;\n  --ink-soft:    #586A78;\n  --line:        #D9CFBC;\n  --line-soft:   #E7DFCE;\n  --sun:         #D2603A;\n  --sun-deep:    #B44E2A;\n  --teal:        #1F6B73;\n  --teal-deep:   #134C53;\n  --leaf:        #4E6B3C;\n  --gold:        #C99454;\n  --shadow-1:    0 1px 0 rgba(20,36,47,.05), 0 1px 2px rgba(20,36,47,.06);\n  --shadow-2:    0 12px 32px -16px rgba(20,36,47,.22), 0 4px 12px -6px rgba(20,36,47,.10);\n  --radius-s:    8px;\n  --radius:      14px;\n  --radius-l:    22px;\n\n  --serif: 'Instrument Serif', 'Iowan Old Style', Georgia, serif;\n  --sans:  'Geist', ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;\n  --mono:  'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  --maxw: 1240px;\n  --gutter: clamp(20px, 4vw, 56px);\n  --section-y: clamp(56px, 8vw, 112px);\n}\n\n*,*::before,*::after{ box-sizing:border-box; }\nhtml{ -webkit-text-size-adjust:100%; scroll-behavior:smooth; }\nbody{\n  margin:0;\n  font-family: var(--sans);\n  font-size: 17px;\n  line-height: 1.55;\n  color: var(--ink);\n  background: var(--sand);\n  font-feature-settings: \"ss01\",\"cv11\";\n  text-rendering: optimizeLegibility;\n  -webkit-font-smoothing: antialiased;\n}\nimg,svg{ display:block; max-width:100%; }\na{ color:inherit; }\nbutton{ font: inherit; cursor: pointer; }\nh1,h2,h3,h4{ margin:0; font-weight:500; letter-spacing:-0.01em; }\np{ margin:0; }\n:focus-visible{ outline: 2px solid var(--teal); outline-offset:3px; border-radius:4px; }\n\n.wrap{ max-width: var(--maxw); margin-inline:auto; padding-inline: var(--gutter); }\n.section{ padding-block: var(--section-y); }\n.eyebrow{\n  font-family: var(--mono);\n  font-size: 12px; letter-spacing: .14em; text-transform: uppercase;\n  color: var(--teal-deep);\n  display:inline-flex; flex-direction: column; align-items:flex-start; gap:10px;\n  position: relative;\n}\n.eyebrow::after{ content:\"\"; width:36px; height:2px; background: var(--teal-deep); display:block; border-radius: 2px; }\n.eyebrow.center{ align-items: center; }\n\n/* Scroll-reveal animations — only when JS is active (.js on <html>) */\n.js .reveal{ opacity: 0; transform: translateY(22px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); will-change: transform, opacity; }\n.js .reveal.in{ opacity: 1; transform: none; }\n.reveal-d1{ transition-delay: .08s; }\n.reveal-d2{ transition-delay: .16s; }\n.reveal-d3{ transition-delay: .24s; }\n.reveal-d4{ transition-delay: .32s; }\n@media (prefers-reduced-motion: reduce){\n  .js .reveal{ opacity: 1 !important; transform: none !important; transition: none !important; }\n}\n\n.h-display{\n  font-family: var(--serif); font-weight:400;\n  font-size: clamp(44px, 7.4vw, 96px);\n  line-height: .98; letter-spacing: -0.02em;\n}\n.h-display em{ font-style: italic; color: var(--sun); }\n.h-2{\n  font-family: var(--serif); font-weight:400;\n  font-size: clamp(32px, 4.4vw, 56px); line-height: 1.04; letter-spacing:-0.015em;\n}\n.h-3{ font-size: clamp(20px, 2vw, 24px); font-weight:600; letter-spacing:-0.01em; }\n.lede{ font-size: clamp(17px, 1.4vw, 19px); color: var(--ink-2); max-width: 62ch; }\n.muted{ color: var(--ink-soft); }\n.mono{ font-family: var(--mono); font-size: 12px; letter-spacing:.06em; text-transform: uppercase; color: var(--ink-soft); }\n\n/* Buttons */\n.btn{\n  --bg: var(--ink); --fg: var(--paper); --bd: var(--ink);\n  display:inline-flex; align-items:center; gap:10px;\n  padding: 14px 22px; border-radius: 999px;\n  background: var(--bg); color: var(--fg); border: 1px solid var(--bd);\n  font-weight: 500; font-size: 15px; letter-spacing:-0.005em;\n  transition: transform .15s ease, background .2s ease, color .2s ease;\n  text-decoration:none; white-space:nowrap;\n}\n.btn:hover{ transform: translateY(-1px); }\n.btn--cta{ --bg: var(--sun); --bd: var(--sun); --fg:#fff; padding: 16px 26px; font-size:16px; box-shadow: 0 10px 20px -8px rgba(210,96,58,.6); }\n.btn--cta:hover{ --bg: var(--sun-deep); --bd: var(--sun-deep); }\n.btn--ghost{ --bg: transparent; --fg: var(--ink); --bd: var(--ink); }\n.btn--ghost:hover{ --bg: var(--ink); --fg: var(--paper); }\n.btn--link{ --bg: transparent; --fg: var(--ink); --bd: transparent; padding: 8px 0; border-radius:0; border-bottom: 1px solid currentColor; }\n.btn .arr{ width:18px; height:18px; }\n\n/* Header / nav */\n.site-header{\n  position: sticky; top:0; z-index: 40;\n  background: color-mix(in oklab, var(--sand) 88%, transparent);\n  backdrop-filter: saturate(140%) blur(10px);\n  -webkit-backdrop-filter: saturate(140%) blur(10px);\n  border-bottom: 1px solid color-mix(in oklab, var(--line) 60%, transparent);\n  transition: box-shadow .25s ease, background .25s ease;\n}\n.site-header.is-scrolled{\n  background: color-mix(in oklab, var(--sand) 96%, transparent);\n  box-shadow: 0 8px 20px -16px rgba(20,36,47,.25);\n}\n.nav{ display:flex; align-items:center; justify-content:space-between; padding-block: 14px; gap: 20px; }\n.brand{ display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit; }\n.brand-mark{\n  width:38px; height:38px; border-radius: 10px;\n  background: var(--ink); color: var(--paper);\n  display:grid; place-items:center;\n  font-family: var(--serif); font-size: 22px; line-height:1;\n  position:relative; overflow:hidden;\n}\n.brand-mark::after{ content:\"\"; position:absolute; inset:auto -8px -10px auto; width:26px; height:26px; background: var(--sun); border-radius:50%; }\n.brand-name{ font-family: var(--serif); font-size: 22px; line-height:1; }\n.brand-name small{ display:block; font-family: var(--mono); font-size:10px; letter-spacing:.16em; color: var(--ink-soft); text-transform: uppercase; margin-top:4px; }\n.nav-links{ display:none; gap: 30px; align-items:center; }\n.nav-links a{ text-decoration:none; font-size:15px; color: var(--ink-2); }\n.nav-links a:hover{ color: var(--ink); }\n.nav-cta{ display:flex; align-items:center; gap: 10px; }\n.phone{\n  display:none; align-items:center; gap:8px;\n  font-family: var(--mono); font-size: 13px; letter-spacing: .04em;\n  color: var(--ink); text-decoration:none;\n}\n.phone .dot{ width:7px; height:7px; border-radius:50%; background: #2EA66A; box-shadow: 0 0 0 4px rgba(46,166,106,.18); }\n.crumbs{ font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); padding: 14px 0 0; display:flex; gap:10px; align-items:center; }\n.crumbs a{ color: var(--ink-soft); text-decoration:none; }\n.crumbs a:hover{ color: var(--ink); }\n.crumbs span{ color: var(--ink); }\n@media (min-width: 1024px){ .phone{ display:inline-flex; } }\n@media (min-width: 1080px){ .nav-links{ display:flex; } }\n\n/* HERO */\n.hero{ position:relative; padding-block: clamp(28px, 4vw, 60px) clamp(56px, 7vw, 96px); overflow:hidden; }\n.hero-grid{ display:grid; gap: clamp(28px, 4vw, 56px); grid-template-columns: 1fr; align-items:start; }\n@media (min-width: 1000px){ .hero-grid{ grid-template-columns: 1.15fr .85fr; align-items: stretch; } }\n.hero-copy{ display:flex; flex-direction:column; gap: 22px; }\n.hero h1{ margin-top: 6px; }\n.hero h1 .tag{\n  display:inline-block;\n  font-family: var(--mono); font-size: 11px; letter-spacing:.16em; text-transform:uppercase;\n  padding: 6px 10px; background: var(--ink); color: var(--paper); border-radius: 6px;\n  margin-left: 0; margin-top: 14px;\n  white-space: nowrap;\n  vertical-align: middle;\n  transform: rotate(-1deg);\n}\n.hero-bullets{ display:flex; flex-wrap:wrap; gap: 8px 10px; margin-top: 6px; }\n.chip{\n  display:inline-flex; align-items:center; gap:8px;\n  padding: 8px 14px; border-radius: 999px;\n  background: var(--paper); border: 1px solid var(--line);\n  font-size: 13.5px; color: var(--ink-2);\n}\n.chip svg{ width:14px; height:14px; color: var(--teal); }\n\n.hero-actions{ display:flex; flex-wrap:wrap; gap: 12px; align-items:center; margin-top: 6px; }\n.hero-trust{ display:flex; align-items:center; gap: 14px; margin-top: 20px; padding-top: 22px; border-top: 1px dashed var(--line); }\n.avatars{ display:flex; }\n.avatars span{\n  width:34px; height:34px; border-radius:50%;\n  background: linear-gradient(135deg, var(--gold), var(--sun));\n  border: 2px solid var(--sand); margin-left:-8px;\n  display:grid; place-items:center; color:#fff; font-size:12px; font-weight:600;\n}\n.avatars span:first-child{ margin-left:0; }\n.avatars span:nth-child(2){ background: linear-gradient(135deg, var(--teal), var(--teal-deep)); }\n.avatars span:nth-child(3){ background: linear-gradient(135deg, var(--ink), var(--ink-2)); }\n.avatars span:nth-child(4){ background: linear-gradient(135deg, var(--leaf), var(--gold)); }\n.stars{ color: var(--sun); letter-spacing:1px; }\n\n/* Lead card */\n.lead-card{\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: var(--radius-l);\n  padding: clamp(22px, 2.6vw, 32px);\n  box-shadow: var(--shadow-2);\n  display:flex; flex-direction:column; gap: 18px;\n  position: relative;\n}\n.lead-card::before{\n  content:\"\"; position:absolute; inset:-1px;\n  border-radius: inherit; pointer-events:none;\n  background: linear-gradient(180deg, rgba(210,96,58,.25), transparent 30%);\n  -webkit-mask: linear-gradient(#000,#000) content-box, linear-gradient(#000,#000);\n  -webkit-mask-composite: xor; mask-composite: exclude;\n  padding:1px;\n}\n.lead-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; }\n.lead-title{ font-family: var(--serif); font-size: 28px; line-height:1.05; }\n.lead-pill{\n  font-family: var(--mono); font-size: 10.5px; letter-spacing:.14em; text-transform:uppercase;\n  padding: 6px 10px; border-radius: 999px;\n  background: color-mix(in oklab, var(--teal) 14%, transparent);\n  color: var(--teal-deep);\n}\n.lead-sub{ color: var(--ink-soft); font-size: 14px; margin-top:-6px; }\n.field{ display:flex; flex-direction:column; gap:6px; }\n.field label{ font-family: var(--mono); font-size: 11px; letter-spacing:.12em; text-transform:uppercase; color: var(--ink-soft); }\n.input, .select{\n  width:100%; appearance:none;\n  background: var(--sand);\n  border: 1px solid var(--line); border-radius: 12px;\n  padding: 14px 16px; font: inherit; color: var(--ink);\n  transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;\n}\n.input::placeholder{ color: color-mix(in oklab, var(--ink-soft) 80%, transparent); }\n.input:focus, .select:focus{ outline:none; border-color: var(--teal); background:#fff; box-shadow: 0 0 0 4px color-mix(in oklab, var(--teal) 18%, transparent); }\n.row-2{ display:grid; gap: 12px; grid-template-columns: 1fr; }\n@media (min-width: 520px){ .row-2{ grid-template-columns: 1fr 1fr; } }\n.lead-foot{\n  display:flex; align-items:center; justify-content:space-between; gap: 14px;\n  flex-wrap:wrap; font-size: 12px; color: var(--ink-soft);\n}\n.lead-foot .secure{ display:inline-flex; align-items:center; gap:6px; }\n\n/* hero backdrop */\n.hero-bg{ position:absolute; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }\n\n/* Agent intro pill at top of hero */\n.agent-intro{\n  align-self: flex-start;\n  display:inline-flex; align-items:center; gap: 14px;\n  padding: 8px 18px 8px 8px;\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: 999px;\n  text-decoration: none; color: inherit;\n  box-shadow: var(--shadow-1);\n  transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;\n}\n.agent-intro:hover{ transform: translateY(-1px); border-color: var(--ink); box-shadow: var(--shadow-2); }\n.agent-avatar{\n  position: relative;\n  width: 48px; height: 48px; border-radius: 50%;\n  background:\n    repeating-linear-gradient(135deg,\n      color-mix(in oklab, var(--sun) 18%, var(--sand)),\n      color-mix(in oklab, var(--sun) 18%, var(--sand)) 6px,\n      color-mix(in oklab, var(--sun) 32%, var(--sand)) 6px,\n      color-mix(in oklab, var(--sun) 32%, var(--sand)) 12px);\n  border: 1px solid var(--line);\n  flex: 0 0 auto;\n  display: grid; place-items: center;\n  overflow: hidden;\n}\n.agent-initials{\n  font-family: var(--serif);\n  font-size: 19px;\n  color: var(--ink);\n  background: color-mix(in oklab, var(--paper) 88%, transparent);\n  width: 32px; height: 32px; border-radius: 50%;\n  display: grid; place-items: center;\n  border: 1px solid color-mix(in oklab, var(--ink) 14%, transparent);\n}\n.agent-status{\n  position: absolute; right: 1px; bottom: 1px;\n  width: 12px; height: 12px; border-radius: 50%;\n  background: #2EA66A; border: 2px solid var(--paper);\n  box-shadow: 0 0 0 4px rgba(46,166,106,.12);\n}\n.agent-meta{ display: flex; flex-direction: column; gap: 2px; line-height: 1.2; }\n.agent-eyebrow{ font-size: 14.5px; color: var(--ink); }\n.agent-eyebrow b{ font-weight: 600; }\n.agent-sub{ font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); }\n.agent-arr{ color: var(--ink-soft); display:inline-flex; transition: transform .2s ease, color .2s ease; }\n.agent-intro:hover .agent-arr{ transform: translateX(2px); color: var(--ink); }\n\n/* hero imagery strip (under copy + form) */\n.hero-strip{\n  display: grid; gap: 14px;\n  grid-template-columns: 1fr;\n}\n.hero-strip__side{ display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }\n@media (min-width: 760px){\n  .hero-strip{ grid-template-columns: 1.6fr 1fr; gap: 16px; }\n  .hero-strip__side{ grid-template-columns: 1fr; gap: 16px; }\n}\n.hero-strip .media--wide{ aspect-ratio: 16/9; }\n.hero-strip .media--tall{ aspect-ratio: 4/5; min-height: 200px; }\n@media (min-width: 760px){\n  .hero-strip .media--wide{ aspect-ratio: 16/11; }\n  .hero-strip .media--tall{ aspect-ratio: 4/5; }\n}\n.hero-bg::before{\n  content:\"\"; position:absolute; right:-12%; top:-20%;\n  width: 56vw; height: 56vw; max-width: 800px; max-height: 800px;\n  background: radial-gradient(circle at 30% 30%, rgba(210,96,58,.18), transparent 60%);\n  border-radius: 50%;\n}\n.hero-bg::after{\n  content:\"\"; position:absolute; left:-10%; bottom:-30%;\n  width: 60vw; height: 60vw; max-width: 760px; max-height: 760px;\n  background: radial-gradient(circle at 70% 30%, rgba(31,107,115,.16), transparent 60%);\n  border-radius: 50%;\n}\n\n/* Stats strip */\n.stats{ background: var(--ink); color: var(--paper); padding-block: clamp(28px, 4vw, 44px); }\n.stats-grid{ display:grid; gap: 28px; grid-template-columns: repeat(2, 1fr); }\n@media (min-width: 760px){ .stats-grid{ grid-template-columns: repeat(4, 1fr); } }\n.stat{ display:flex; flex-direction:column; gap:6px; }\n.stat b{ font-family: var(--serif); font-weight: 400; font-size: clamp(40px, 4.4vw, 60px); line-height: 1; letter-spacing: -0.02em; }\n.stat b em{ font-style:italic; color: var(--sun); }\n.stat span{ font-family: var(--mono); font-size: 11px; letter-spacing:.16em; text-transform:uppercase; color: color-mix(in oklab, var(--paper) 70%, transparent); }\n.stat .sub{ font-size: 13.5px; color: color-mix(in oklab, var(--paper) 75%, transparent); margin-top: 2px; font-family: var(--sans); letter-spacing: 0; text-transform:none; }\n\n/* Section head — eyebrow + h2 stacked, lede sits BELOW the h2 (never beside) */\n.section-head{\n  display:flex; flex-direction:column; gap: 18px;\n  margin-bottom: clamp(28px, 4vw, 48px);\n  max-width: 880px;\n}\n.section-head > div:first-child{ display:flex; flex-direction:column; gap: 14px; }\n.section-head .head-right{ margin-top: 6px; }\n.section-head h2{ margin-top: 0 !important; }\n.section-head .eyebrow + h2{ margin-top: 0; }\n.section-head .lede{ max-width: 64ch; }\n\n/* Steps (process) */\n.steps{ display:grid; gap: 18px; grid-template-columns: 1fr; counter-reset: step; }\n@media (min-width: 640px){ .steps{ grid-template-columns: repeat(2, 1fr); gap: 18px; } }\n@media (min-width: 1080px){ .steps{ grid-template-columns: repeat(4, 1fr); gap: 18px; } }\n.step{\n  background: var(--paper); border: 1px solid var(--line);\n  border-radius: var(--radius-l);\n  padding: 26px;\n  display:flex; flex-direction:column; gap: 12px;\n  min-height: 260px;\n  position: relative;\n  transition: transform .25s ease, border-color .2s ease, box-shadow .25s ease;\n}\n.step:hover{ transform: translateY(-2px); border-color: color-mix(in oklab, var(--ink) 18%, var(--line)); box-shadow: var(--shadow-2); }\n.step-num{ font-family: var(--serif); font-style: italic; font-size: 50px; line-height: 1; color: var(--sun); }\n.step h3{ font-family: var(--serif); font-weight: 400; font-size: 24px; line-height: 1.1; }\n.step p{ color: var(--ink-2); font-size: 15px; }\n.step .step-meta{\n  margin-top:auto; padding-top: 16px; border-top: 1px dashed var(--line);\n  display:flex; align-items:center; justify-content:space-between;\n  font-family: var(--mono); font-size: 11px; letter-spacing:.12em; text-transform:uppercase;\n  color: var(--ink-soft);\n}\n.step .step-meta b{ color: var(--ink); font-weight: 600; }\n\n/* Situations (any situation we buy) — cards are links */\n.sit{ background: var(--paper); border-top:1px solid var(--line-soft); border-bottom:1px solid var(--line-soft); }\n.sit-grid{\n  display:grid; gap: 1px;\n  grid-template-columns: 1fr;\n  background: var(--line-soft);\n  border: 1px solid var(--line-soft); border-radius: var(--radius-l);\n  overflow:hidden;\n}\n@media (min-width: 640px){ .sit-grid{ grid-template-columns: repeat(2, 1fr); } }\n@media (min-width: 1080px){ .sit-grid{ grid-template-columns: repeat(3, 1fr); } }\n.sit-card{\n  background: var(--paper);\n  padding: 28px;\n  display:flex; flex-direction:column; gap: 12px;\n  min-height: 220px;\n  text-decoration: none; color: inherit;\n  position: relative;\n  transition: background .25s ease, transform .25s ease;\n}\n.sit-card:hover{ background: color-mix(in oklab, var(--sun) 6%, var(--paper)); }\n.sit-card:hover .ico{ background: var(--sun); color: var(--paper); }\n.sit-card:hover .arr-out{ transform: translate(4px, -4px); color: var(--sun-deep); }\n.sit-card .ico{\n  width:42px; height:42px; border-radius: 12px;\n  background: color-mix(in oklab, var(--teal) 12%, var(--paper)              <div><b>Clearwater seller<\u002Fb><br>Verified review — placeholder<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fdiv>\n\n        <div class=\"badge-row\">\n          <a href=\"https://webuystpetehouses.com/testimonials/\" class=\"badge\"><span class=\"dot\"><\u002Fspan> Read testimonials from Clearwater sellers<\u002Fa>\n          <a href=\"https://webuystpetehouses.com/our-company/\" class=\"badge gold\"><span class=\"dot\"><\u002Fspan> About our company<\u002Fa>\n        <\u002Fdiv>\n        <p class=\"mono\" style=\"margin-top: 16px;\">[BRAND: Replace placeholders with verified Google review badges and quotes]<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     COMPARISON + CALCULATOR (cluster 6)\n     ============================================================ -->\n<section class=\"section\" id=\"compare\" data-screen-label=\"Cash vs agent\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">Side by side<\u002Fspan>\n        <h2 class=\"h-2\" style=\"margin-top:14px;\">Cash offer vs.<br><em style=\"font-style:italic;color:var(--sun);\">listing with an agent<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"head-right\">\n        <p class=\"lede\">\n          Cash offers let Clearwater sellers close fast and skip agent fees —\n          no showings, no repairs, no surprises. Here's how the two options compare.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"compare\" role=\"table\" aria-label=\"Comparison: cash offer vs listing with an agent\">\n      <div class=\"compare-grid\">\n        <div class=\"col-h\"><\u002Fdiv>\n        <div class=\"col-h us\">Cash Offer (Us)<\u002Fdiv>\n        <div class=\"col-h\">Listing with an Agent<\u002Fdiv>\n\n        <div class=\"row-h\">Commissions<\u002Fdiv>\n        <div class=\"us-cell\">None<\u002Fdiv>\n        <div class=\"other-cell\">Typically 5–6% of sale price<\u002Fdiv>\n\n        <div class=\"row-h\">Closing timeline<\u002Fdiv>\n        <div class=\"us-cell\">7–14 days (your choice)<\u002Fdiv>\n        <div class=\"other-cell\">30–60+ days after accepting<\u002Fdiv>\n\n        <div class=\"row-h\">Repairs needed<\u002Fdiv>\n        <div class=\"us-cell\">None — we buy as-is<\u002Fdiv>\n        <div class=\"other-cell\">Often required to attract buyers<\u002Fdiv>\n\n        <div class=\"row-h\">Showings &amp; open houses<\u002Fdiv>\n        <div class=\"us-cell\">None<\u002Fdiv>\n        <div class=\"other-cell\">Multiple showings, disruptions<\u002Fdiv>\n\n        <div class=\"row-h\">Buyer financing risk<\u002Fdiv>\n        <div class=\"us-cell\">Zero — we pay cash<\u002Fdiv>\n        <div class=\"other-cell\">Deals can fall through if financing fails<\u002Fdiv>\n\n        <div class=\"row-h\">Closing costs<\u002Fdiv>\n        <div class=\"us-cell\">We cover them<\u002Fdiv>\n        <div class=\"other-cell\">Seller typically pays 2–3%<\u002Fdiv>\n\n        <div class=\"row-h\">Certainty<\u002Fdiv>\n        <div class=\"us-cell\">Guaranteed close<\u002Fdiv>\n        <div class=\"other-cell\">Contingencies, appraisals, delays<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- savings calculator widget -->\n    <div class=\"calc\" id=\"calc\">\n      <div class=\"calc-fields\">\n        <div>\n          <h3>Estimate your <em style=\"font-style:italic; color:var(--sun);\">cash-sale savings<\u002Fem><\u002Fh3>\n          <p class=\"sub\">Move the sliders. We'll roughly estimate what you'd pay an agent vs. a cash sale to us.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"calc-row\">\n          <label for=\"hv\">Estimated home value <b id=\"hvOut\">$350,000<\u002Fb><\u002Flabel>\n          <input id=\"hv\" type=\"range\" min=\"100000\" max=\"900000\" step=\"10000\" value=\"350000\">\n        <\u002Fdiv>\n        <div class=\"calc-row\">\n          <label for=\"rp\">Repairs needed before listing <b id=\"rpOut\">$12,000<\u002Fb><\u002Flabel>\n          <input id=\"rp\" type=\"range\" min=\"0\" max=\"60000\" step=\"1000\" value=\"12000\">\n        <\u002Fdiv>\n        <div class=\"calc-row\">\n          <label for=\"ag\">Agent commission <b id=\"agOut\">6.0%<\u002Fb><\u002Flabel>\n          <input id=\"ag\" type=\"range\" min=\"3\" max=\"7\" step=\"0.5\" value=\"6\">\n        <\u002Fdiv>\n        <div class=\"calc-row\">\n          <label for=\"cc\">Seller closing costs <b id=\"ccOut\">2.5%<\u002Fb><\u002Flabel>\n          <input id=\"cc\" type=\"range\" min=\"1\" max=\"4\" step=\"0.5\" value=\"2.5\">\n        <\u002Fdiv>\n        <p class=\"mono\" style=\"margin-top: 4px;\">For illustration only. Your actual offer depends on local Clearwater comps and condition.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"calc-result\">\n        <span class=\"lab\">Potential savings with a cash sale<\u002Fspan>\n        <div class=\"big\" id=\"savingsOut\">$<span>33,000<\u002Fspan><\u002Fdiv>\n        <div class=\"calc-bd\" aria-live=\"polite\">\n          <div class=\"ln\"><span>Agent commission<\u002Fspan><span id=\"bdCom\">$21,000<\u002Fspan><\u002Fdiv>\n          <div class=\"ln\"><span>Closing costs (seller)<\u002Fspan><span id=\"bdCc\">$8,750<\u002Fspan><\u002Fdiv>\n          <div class=\"ln\"><span>Repairs avoided<\u002Fspan><span id=\"bdRp\">$12,000<\u002Fspan><\u002Fdiv>\n          <div class=\"ln total\"><span>Total avoided<\u002Fspan><span id=\"bdTotal\">$41,750<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     LOCAL MARKET INSIGHTS (cluster 9)\n     ============================================================ -->\n<section class=\"section\" id=\"market\" data-screen-label=\"Clearwater market insights\">\n  <div class=\"wrap\">\n    <div class=\"section-head\" style=\"margin-bottom: 32px;\">\n      <div>\n        <span class=\"eyebrow\">Clearwater market insights<\u002Fspan>\n        <h2 class=\"h-2\" style=\"margin-top:14px;\">What affects<br>your <em style=\"font-style:italic;color:var(--sun);\">cash offer<\u002Fem>.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"head-right\">\n        <p class=\"lede\">\n          Flood zones, HOA rules, insurance — local nuances can influence timelines and\n          offer calculations in Clearwater. We navigate these so you don't have to.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"insights-grid\">\n      <div class=\"ph reveal\" data-tone=\"sun\" data-label=\"[IMAGE: flood-zone &amp; HOA map context]\" style=\"min-height: 380px;\" aria-hidden=\"true\"><\u002Fdiv>\n\n      <div class=\"factor-list reveal reveal-d1\">\n        <div class=\"factor\">\n          <span class=\"pre\">A<\u002Fspan>\n          <div>\n            <h3>Flood zones &amp; insurance<\u002Fh3>\n            <p>Many Clearwater properties sit in FEMA flood zones. Flood insurance requirements can affect marketability and timeline — but we buy homes in flood zones as-is.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"factor\">\n          <span class=\"pre\">B<\u002Fspan>\n          <div>\n            <h3>HOA rules &amp; restrictions<\u002Fh3>\n            <p>If your property is in an HOA, approval and transfer fees can add a few days to closing. We handle the HOA paperwork and fees on your behalf.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"factor\">\n          <span class=\"pre\">C<\u002Fspan>\n          <div>\n            <h3>Local comps &amp; ARV<\u002Fh3>\n            <p>Offers are based on your home's as-is value, minus repair costs and a fair margin for resale. We pull recent sales data from Clearwater neighborhoods to calculate a fair price.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"factor\">\n          <span class=\"pre\">D<\u002Fspan>\n          <div>\n            <h3>Building codes &amp; permit history<\u002Fh3>\n            <p>Clearwater building codes and permit history can affect value. We assess these factors upfront, so there are no surprises mid-closing.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     FAQ (cluster 7)\n     ============================================================ -->\n<section class=\"section\" id=\"faq\" data-screen-label=\"FAQ\">\n  <div class=\"wrap\" style=\"max-width: 920px;\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">Frequently asked<\u002Fspan>\n        <h2 class=\"h-2\" style=\"margin-top:14px;\">Clearwater sellers ask us<br><em style=\"font-style:italic; color:var(--sun);\">these the most.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"head-right\">\n        <p class=\"lede\">\n          Direct, honest answers about cash sales, speed, and costs — no jargon.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"faq-list\">\n      <details class=\"faq-item\" open=\"\">\n        <summary class=\"faq-q\">What is a cash home buyer?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>A cash home buyer is a company or investor who purchases houses directly with cash, letting you skip banks and repairs. We buy your home as-is and close quickly without traditional financing delays.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">What is a cash offer and how does it work?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>A cash offer means a direct purchase — no banks or agent fees. We assess your home's value and make a fair offer based on its current condition. You review the offer with no obligation, and if you accept, we close on your timeline.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">How does the cash offer process work for selling a house in Clearwater?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>The process is simple: 1) Contact us for a free offer. 2) We assess your property. 3) You receive a no-obligation cash offer. 4) Choose your closing date. We handle the paperwork and closing costs, so you can move on quickly.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">How fast can I sell my house to a cash buyer in Clearwater?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>You can sell your Clearwater house for cash in as little as 7 days, though most closings in the Tampa Bay area take 7–14 days depending on title work and your schedule. You control the timeline.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">What types of properties do you buy in Clearwater?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>We buy single-family homes, condos, townhomes, and multi-unit properties in Clearwater, regardless of condition or price range. Whether your home needs major repairs or is move-in ready, we make fair cash offers.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">Are cash buyers legitimate in Clearwater?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>Yes, many cash home buyers in Clearwater are legitimate, but always check reviews and verify credentials before proceeding. We encourage you to review our testimonials and ask for proof of funds before accepting any offer.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">Is there a non-committal cash offer for Clearwater homes?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>Yes — our cash offers are free and carry no obligation to accept. Request an offer, review it on your own time, and decide what's best for you. No pressure.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">Are there any fees or commissions when selling to a cash buyer?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>No — there are no fees or real estate commissions when you sell your house for cash to us. We also cover closing costs, so you keep more of your sale price.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">Do I have to make repairs before selling my house for cash in Clearwater?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>No repairs are needed — we buy Clearwater houses as-is, in any condition. You don't have to fix, clean, or stage anything. We handle it all after closing.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">How do I get a cash offer for my home in Clearwater?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">\n          <p>Getting a cash offer is easy: 1) Fill out our online form or call us. 2) We review your property. 3) Get your cash offer — no pressure, no commitment. The whole process takes just a few minutes to start.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">What is the difference between a cash offer and listing with an agent?\n          <span class=\"plus\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\ Scroll-reveal animations\n  (function(){\n    if (typeof IntersectionObserver === 'undefined') {\n      document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));\n      return;\n    }\n    // Auto-tag common content blocks\n    const autoSelectors = [\n      '.section-head',\n      '.step',\n      '.sit-card',\n      '.feat',\n      '.tcard',\n      '.ti',\n      '.factor',\n      '.res',\n      '.faq-item',\n      '.compare',\n      '.calc',\n      '.area-map',\n      '.area-list',\n      '.cta-card',\n      '.stats-grid',\n      '.lead-card',\n      '.hero-strip',\n      '.media'\n    ];\n    autoSelectors.forEach(sel => {\n      document.querySelectorAll(sel).forEach((el, i) => {\n        if (!el.classList.contains('reveal')) el.classList.add('reveal');\n        // Stagger siblings inside same parent (skip if delay already set)\n        const hasDelay = ['reveal-d1','reveal-d2','reveal-d3','reveal-d4'].some(c=>el.classList.contains(c));\n        if (!hasDelay && el.parentElement){\n          const siblings = Array.from(el.parentElement.children).filter(c => c.matches(sel));\n          const idx = siblings.indexOf(el);\n          if (idx > 0 && idx < 5) el.classList.add('reveal-d' + idx);\n        }\n      });\n    });\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting){\n          e.target.classList.add('in');\n          io.unobserve(e.target);\n        }\n      });\n    }, { rootMargin: '0px 0px -8% 0px', threshold: 0.08 });\n    document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n  })();\n\n  // Sticky header shadow on scroll\n  (function(){\n    const h = document.querySelector('.site-header');\n    if (!h) return;\n    const onScroll = () => {\n      if (window.scrollY > 8) h.classList.add('is-scrolled');\n      else h.classList.remove('is-scrolled');\n    };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    onScroll();\n  })();\n\n  // Before/After slider\n  (function(){\n    document.querySelectorAll('.ba-frame').forEach(frame => {\n      const after = frame.querySelector('.ba-after');\n      const handle = frame.querySelector('.ba-handle');\n      if (!after || !handle) return;\n      let pos = 50; // percent\n      const apply = () => {\n        after.style.clipPath = `inset(0 0 0 ${pos}%)`;\n        handle.style.left = pos + '%';\n      };\n      const onMove = (clientX) => {\n        const r = frame.getBoundingClientRect();\n        pos = Math.max(0, Math.min(100, ((clientX - r.left) / r.width) * 100));\n        apply();\n      };\n      let dragging = false;\n      const start = (e) => {\n        dragging = true;\n        frame.classList.add('is-dragging');\n        const pt = e.touches ? e.touches[0] : e;\n        onMove(pt.clientX);\n      };\n      const move = (e) => {\n        if (!dragging) return;\n        const pt = e.touches ? e.touches[0] : e;\n        onMove(pt.clientX);\n        if (e.cancelable) e.preventDefault();\n      };\n      const end = () => { dragging = false; frame.classList.remove('is-dragging'); };\n      handle.addEventListener('mousedown', start);\n      frame.addEventListener('mousedown', start);\n      window.addEventListener('mousemove', move);\n      window.addEventListener('mouseup', end);\n      handle.addEventListener('touchstart', start, {passive:true});\n      frame.addEventListener('touchstart', start, {passive:true});\n      window.addEventListener('touchmove', move, {passive:false});\n      window.addEventListener('touchend', end);\n      apply();\n    });\n  })();\n\n  // Savings calculator\n  (function(){\n    const hv = document.getElementById('hv');\n    const rp = document.getElementById('rp');\n    const ag = document.getElementById('ag');\n    const cc = document.getElementById('cc');\n    const hvOut = document.getElementById('hvOut');\n    const rpOut = document.getElementById('rpOut');\n    const agOut = document.getElementById('agOut');\n    const ccOut = document.getElementById('ccOut');\n    const bdCom = document.getElementById('bdCom');\n    const bdCc  = document.getElementById('bdCc');\n    const bdRp  = document.getElementById('bdRp');\n    const bdTotal = document.getElementById('bdTotal');\n    const savingsOut = document.getElementById('savingsOut');\n    if (!hv) return;\n    const fmt = (n) => '$' + Math.round(n).toLocaleString();\n    function recalc(){\n      const v = +hv.value;\n      const r = +rp.value;\n      const a = +ag.value / 100;\n      const c = +cc.value / 100;\n      const com = v * a;\n      const cco = v * c;\n      const total = com + cco + r;\n      hvOut.textContent = fmt(v);\n      rpOut.textContent = fmt(r);\n      agOut.textContent = (+ag.value).toFixed(1) + '%';\n      ccOut.textContent = (+cc.value).toFixed(1) + '%';\n      bdCom.textContent = fmt(com);\n      bdCc.textContent  = fmt(cco);\n      bdRp.textContent  = fmt(r);\n      bdTotal.textContent = fmt(total);\n      savingsOut.innerHTML = '$<span>' + Math.round(total).toLocaleString() + '<\u002Fspan>';\n    }\n    [hv,rp,ag,cc].forEach(el => el.addEventListener('input', recalc));\n    recalc();\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
